name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dkrapansh
          outputs: |
            dist/snake.svg?color_snake=1E90FF&color_dot_empty=#111111&color_dot_1=#0a1628&color_dot_2=#0d2444&color_dot_3=#1155aa&color_dot_4=#1E90FF

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
